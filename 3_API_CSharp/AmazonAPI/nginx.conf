events { worker_connections 1024; }

http {
    upstream amazon_api_cluster {
        server amazon_api_1:8080; # Estos nombres deben coincidir con docker-compose
        server amazon_api_2:8080;
        server amazon_api_3:8080;
    }

    server {
        listen 80;
        location / {
            proxy_pass http://amazon_api_cluster;
        }
    }
}